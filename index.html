<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duloxetin Tapering Tracker</title>
    <style>
        :root {
            --bg: #121212; --surface: #1e1e1e; --primary: #03dac6; --text: #e0e0e0; --error: #cf6679;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg); color: var(--text);
            max-width: 800px; margin: 0 auto; padding: 20px;
        }
        h1, h2 { color: var(--primary); }
        .card {
            background: var(--surface); padding: 20px; border-radius: 8px; margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
        th { color: var(--primary); }
        .completed { text-decoration: line-through; color: #888; }
        input[type="checkbox"] { transform: scale(1.5); cursor: pointer; }
        button {
            background: var(--primary); color: #000; border: none;
            padding: 10px 15px; border-radius: 4px; font-weight: bold; cursor: pointer;
        }
        button:hover { opacity: 0.8; }
        .danger { background: var(--error); color: white; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>Duloxetin Udtrapning</h1>
    
    <div class="card">
        <h2>Parametre</h2>
        <p><strong>Startdosis:</strong> 90 mg</p>
        <p><strong>Reduktion:</strong> 10% hyperbolsk hver 4. uge</p>
        <p><strong>Perler pr. 30 mg:</strong> 84 (Duloxetin STADA)</p>
        <button onclick="generateSchedule()">Generér / Nulstil Skema</button>
    </div>

    <div class="card">
        <h2>Dit Forløb</h2>
        <table id="scheduleTable">
            <thead>
                <tr>
                    <th>Trin</th>
                    <th>Måldosis</th>
                    <th>Handling (Hele 30mg + Perler)</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>
    <button class="danger" onclick="clearData()">Slet al data</button>

<script>
    const START_DOSE = 90;
    const REDUCTION_RATE = 0.90; // 10% reduktion
    const BEADS_PER_30MG = 84;
    const MIN_DOSE = 0.5; // Stop når dosis er under dette

    // Load state from localStorage
    let state = JSON.parse(localStorage.getItem('taperState')) || { schedule: [], completedSteps: [] };

    function calculateStep(currentDose) {
        let fullCapsules = Math.floor(currentDose / 30);
        let remainderMg = currentDose % 30;
        let beadsToKeep = Math.round((remainderMg / 30) * BEADS_PER_30MG);
        
        // Hvis beads afrundes til 84, tæller det som en fuld kapsel
        if (beadsToKeep === BEADS_PER_30MG) {
            fullCapsules += 1;
            beadsToKeep = 0;
        }

        let instruction = "";
        if (fullCapsules > 0) instruction += `${fullCapsules} x 30mg intakt `;
        if (beadsToKeep > 0) instruction += `+ ${beadsToKeep} perler`;
        if (fullCapsules === 0 && beadsToKeep === 0) instruction = "0 mg (Helt ude)";

        return {
            dose: currentDose.toFixed(1),
            instruction: instruction.trim()
        };
    }

    function generateSchedule() {
        if(state.schedule.length > 0 && !confirm("Dette vil overskrive din nuværende fremgang. Er du sikker?")) return;
        
        let schedule = [];
        let currentDose = START_DOSE;
        
        // Trin 0 (Baseline)
        schedule.push({ step: 0, ...calculateStep(currentDose) });

        let stepCount = 1;
        while (currentDose > MIN_DOSE) {
            currentDose = currentDose * REDUCTION_RATE;
            schedule.push({ step: stepCount, ...calculateStep(currentDose) });
            stepCount++;
        }
        
        state.schedule = schedule;
        state.completedSteps = [];
        saveState();
        renderTable();
    }

    function toggleStep(stepIndex) {
        const idx = state.completedSteps.indexOf(stepIndex);
        if (idx > -1) {
            state.completedSteps.splice(idx, 1); // Fjern markering
        } else {
            state.completedSteps.push(stepIndex); // Tilføj markering
        }
        saveState();
        renderTable();
    }

    function saveState() {
        localStorage.setItem('taperState', JSON.stringify(state));
    }

    function clearData() {
        if(confirm("Er du sikker på at du vil slette alt?")) {
            localStorage.removeItem('taperState');
            state = { schedule: [], completedSteps: [] };
            renderTable();
        }
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        
        if (state.schedule.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4">Intet skema genereret endnu. Klik på knappen ovenfor.</td></tr>';
            return;
        }

        state.schedule.forEach((s) => {
            const isCompleted = state.completedSteps.includes(s.step);
            const rowClass = isCompleted ? 'completed' : '';
            const checked = isCompleted ? 'checked' : '';
            
            const tr = document.createElement('tr');
            tr.className = rowClass;
            tr.innerHTML = `
                <td>Trin ${s.step}</td>
                <td>${s.dose} mg</td>
                <td><strong>${s.instruction}</strong></td>
                <td><input type="checkbox" onchange="toggleStep(${s.step})" ${checked}></td>
            `;
            tbody.appendChild(tr);
        });
    }

    // Initial render
    renderTable();
</script>
</body>
</html>
